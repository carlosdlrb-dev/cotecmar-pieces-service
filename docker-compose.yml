services:
  app:
    build:
      context: .
    container_name: pieces_service_app
    ports:
      # Avoid clashing with local `php artisan serve` (often 8001)
      - "${APP_HOST_PORT:-8002}:8000"
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      APP_URL: "http://localhost:${APP_HOST_PORT:-8002}"
      RUN_MIGRATIONS: "${RUN_MIGRATIONS:-true}"
      RUN_SEED: "${RUN_SEED:-true}"
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    command: ["sh", "-lc", "chmod -R 775 storage bootstrap/cache || true && sh ./docker/entrypoint.sh"]

  mysql:
    image: mysql:8.0
    container_name: pieces_service_mysql
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-pieces-service}"
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-root}"
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - pieces_service_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${DB_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pieces_service_mysql_data:
